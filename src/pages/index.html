<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dev Quiz</title>
  </head>
  <body>
    <div class="wrapper">
      <section class="quiz-section">
        <div class="container">
          <div class="main-info-block">
            <div class="main-block">
              <h1>DevQuiz</h1>
              <p>Test your knowledge</p>
            </div>
            <ul class="quiz-list">
              <li>
                <div class="quiz-card">
                  <div class="quiz-card-body">
                    <div class="quiz-card-info">
                      <span class="badge medium">MEDIUM</span>
                      <span class="question">
                        <i class="icon-question"></i>
                        <span class="num">10</span>
                      </span>
                    </div>

                    <h2>CSS & HTML Mastery</h2>
                    <p>
                      From flexbox to grid, selectors to specificity, test your
                      front-end fundamentals. Covers modern CSS features,
                      semantic HTML, accessibility, and responsive design
                      patterns.
                    </p>
                  </div>
                  <div class="quiz-card-footer">
                    <button
                      class="btn popup-open"
                      data-id="cmmdjge3c00fcutgryuk42tht"
                    >
                      Open
                    </button>
                  </div>
                </div>
              </li>
            </ul>
          </div>
        </div>
        <div class="popup-holder">
          <div class="popup">
            <button class="popup-close"></button>
            <div class="quiz">
              <div class="quiz-nav">
                <div class="quiz-info">
                  <span class="quiz-num"
                    >Question <span class="current">1</span> of
                    <span class="total">10</span></span
                  >
                  <span class="quiz-time">
                    <i class="icon-clock"></i>
                    <div class="time-holder">
                      <span class="minutes">0</span>:<span class="seconds"
                        >00</span
                      >
                    </div>
                  </span>
                </div>
                <div class="quiz-progress">
                  <span class="quiz-progress-bar"></span>
                </div>
              </div>
              <div class="quiz-slider">
                <div class="quiz-track">
                  <div class="quiz-slide">
                    <form class="quiz-form" action="#">
                      <div class="info-holder">
                        <span class="badge easy">EASY</span>
                        <strong class="h3">What is the CSS box model?</strong>
                        <div class="answers-holder">
                          <label class="answer">
                            <input
                              type="radio"
                              name="question-cmmdjge3c00fdutgr2iw1oamh"
                              data-question="cmmdjge3c00fdutgr2iw1oamh"
                              value="Content, padding, border, and margin layers around every element"
                            />
                            <span class="custom-radio"></span>
                            <span class="custom-label">
                              Content, padding, border, and margin layers around
                              every element
                            </span>
                          </label>
                          <label class="answer">
                            <input
                              type="radio"
                              name="question-cmmdjge3c00fdutgr2iw1oamh"
                              data-question="cmmdjge3c00fdutgr2iw1oamh"
                              value="A layout system for creating grid designs"
                            />
                            <span class="custom-radio"></span>
                            <span class="custom-label">
                              A layout system for creating grid designs
                            </span>
                          </label>
                          <label class="answer"
                            ><input
                              type="radio"
                              name="question-cmmdjge3c00fdutgr2iw1oamh"
                              data-question="cmmdjge3c00fdutgr2iw1oamh"
                              value="A method for centering elements horizontally"
                            />
                            <span class="custom-radio"></span>
                            <span class="custom-label">
                              A method for centering elements horizontally
                            </span>
                          </label>
                          <label class="answer">
                            <input
                              type="radio"
                              name="question-cmmdjge3c00fdutgr2iw1oamh"
                              data-question="cmmdjge3c00fdutgr2iw1oamh"
                              value="The hierarchy of CSS selectors"
                            />
                            <span class="custom-radio"></span>
                            <span class="custom-label">
                              The hierarchy of CSS selectors
                            </span>
                          </label>
                        </div>
                      </div>
                      <div class="btn-holder">
                        <button class="btn btn-next" type="submit">Next</button>
                      </div>
                    </form>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <template id="quiz-list-template">
          <li>
            <div class="quiz-card">
              <div class="quiz-card-body">
                <span class="badge"></span>
                <h2></h2>
                <p></p>
              </div>
              <div class="quiz-card-footer">
                <button class="btn popup-open">Open</button>
              </div>
            </div>
          </li>
        </template>
        <template id="quiz-template">
          <div class="quiz-slide">
            <form class="quiz-form" action="#">
              <div class="info-holder">
                <span class="badge"></span>
                <strong class="h3"></strong>
                <div class="answers-holder"></div>
              </div>
              <div class="btn-holder">
                <button class="btn btn-next" type="submit">Next</button>
              </div>
            </form>
          </div>
        </template>
        <template id="result-template">
          <div class="result">
            <div class="result-icon-block">
              <i class="icon-cup"></i>
            </div>
            <h2>Quiz Complete</h2>
            <span class="result-num"></span>
            <ul class="result-list">
              <li>
                <div class="info-block">
                  <span class="correct-num"></span>
                  <span>Correct</span>
                </div>
              </li>
              <li>
                <div class="info-block">
                  <span class="wrong-num"></span>
                  <span>Wrong</span>
                </div>
              </li>
              <li>
                <div class="info-block">
                  <span class="time-num">
                    <span class="minutes"></span>:<span class="seconds"></span>
                  </span>
                  <span>Time</span>
                </div>
              </li>
            </ul>
            <ol class="answers-list"></ol>
            <button class="btn btn-back">Back to quizes</button>
          </div>
        </template>
        <template id="answer-template">
          <li>
            <span class="question-text"
              ><b>Question:</b> <span class="text"></span
            ></span>
            <span class="answer-text"
              ><b>Answer:</b> <span class="text"></span
            ></span>
            <span class="explanation-text"
              ><b>Explanation:</b>
              <span class="text"></span>
            </span>
          </li>
        </template>
      </section>
    </div>
  </body>
</html>
